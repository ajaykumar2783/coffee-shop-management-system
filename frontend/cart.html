<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cart - BrewNest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="js/cart.js"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">☕ BrewNest</div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="cart.html" class="active">Cart</a>
        <a href="track-order.html">Track Order</a>
        <a href="admin-login.html">Admin</a>
      </div>
    </nav>

    <section class="page-header">
      <span>Your Cart</span>
      <h1>Review, Pay & Place Order</h1>
    </section>

    <section class="cart-layout">
      <div class="cart-items" id="cartItems"></div>

      <div class="checkout-card">
        <h2>Order Details</h2>

        <input type="text" id="customerName" placeholder="Customer Name" />
        <input type="text" id="phone" placeholder="Phone Number" />
        <input type="text" id="tableNo" placeholder="Table No / Takeaway" />

        <h3>Payment Method</h3>

        <div class="payment-options">
          <label>
            <input type="radio" name="payment" value="UPI" checked />
            UPI
          </label>

          <label>
            <input type="radio" name="payment" value="Cash" />
            Cash
          </label>

          <label>
            <input type="radio" name="payment" value="Card" />
            Card
          </label>
        </div>

        <div class="total-box">
          <span>Total Amount</span>
          <strong id="totalAmount">₹0</strong>
        </div>

        <button class="btn primary full" onclick="placeOrder()">
          Place Order
        </button>

        <div id="afterOrderActions"></div>
      </div>
    </section>
  </body>
</html>
